<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content = "Steven Peralta">
    <meta name="description" content="A To Do List where you can add to do's.">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do List</title>
</head>
<body>
    <main>
        <div class="sidebar">
            <h1>Projects</h1>
            <button class = "add-project">New Project</button>
            <button class="add-to-do">New To-Do</button>
        </div>
        <div class="to-do-screen">
            <h1 class="to-do-title">Project 1</h1>
            <h2>Today</h2>
            <h3 class="to-do-description">Description for Project</h3>
            <button class = "edit-to-do">Edit</button>
        </div>
    </main>
</body>
<script type="module" src="main.js"></script>
</html>
