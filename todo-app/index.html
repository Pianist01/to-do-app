<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content = "Steven Peralta">
    <meta name="description" content="A To Do List where you can add to do's.">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do List</title>
</head>
<body>
    <main>
        <div class="sidebar">
            <h1>My Projects</h1>

            <div class="user-projects">
                <ul class="projects">
                    <li class="project">Project 1</li>
                </ul>
            </div>
            
            <button class = "add-project">New Project</button>
            
        </div>

        <div class="to-do-screen">
            <h1 class="to-do-title">Project 1</h1>
            <h2>Today</h2>
            <h3 class="to-do-description">Description for Project</h3>
            <div class="to-do">
            <button class="add-to-do">New To-Do</button>
                <ul class="todos">
                    <li>
                        <input type = "checkbox" id="default1" name="checklist" value="defaulttask1">
                        <label for = "default1">Wake Up</label>
                        <div class="edit-task-1"></div>
                    </li>
                    <li>
                        <input type="checkbox" id="default2" name="checklist" value="defaulttask2">
                        <label for = "default2">Shower</label>
                        <div class="edit-task-2"></div>
                    </li>
                    <li>
                        <input type="checkbox" id="default3" name="checklist" value="defaulttask3">
                        <label for = "default3">Eat Breakfast</label>
                        <div class="edit-task-3"></div>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</body>
<script type="module" src="main.js"></script>
</html>
